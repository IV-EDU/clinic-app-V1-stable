{% if reception_errors %}
<div class="reception-errors">
  <ul>
    {% for error in reception_errors %}
    <li>{{ error }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}
<form method="post" action="{{ form_action }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="reception-form-grid">
    <div>
      <label class="form-label">{{ t('patient_name') }}</label>
      <input class="form-control" type="text" name="patient_name" value="{{ reception_form.patient_name }}">
    </div>
    <div>
      <label class="form-label">{{ t('phone') }}</label>
      <input class="form-control" type="text" name="phone" value="{{ reception_form.phone }}">
    </div>
    <div>
      <label class="form-label">{{ t('page_number') }}</label>
      <input class="form-control" type="text" name="page_number" value="{{ reception_form.page_number }}">
    </div>
    <div>
      <label class="form-label">{{ t('date') }}</label>
      <input class="form-control" type="date" name="visit_date" value="{{ reception_form.visit_date }}">
    </div>
    <div>
      <label class="form-label">{{ t('visit_type') }}</label>
      <select class="form-control" name="visit_type">
        <option value="exam" {{ 'selected' if reception_form.visit_type == 'exam' else '' }}>{{ t('vt_exam') }}</option>
        <option value="followup" {{ 'selected' if reception_form.visit_type == 'followup' else '' }}>{{ t('vt_follow') }}</option>
        <option value="none" {{ 'selected' if reception_form.visit_type == 'none' else '' }}>{{ t('vt_none') }}</option>
      </select>
    </div>
    <div>
      <label class="form-label">{{ t('doctor') }}</label>
      <select class="form-control" name="doctor_id">
        {% for doctor in doctor_options %}
        <option value="{{ doctor.doctor_id }}" {{ 'selected' if reception_form.doctor_id == doctor.doctor_id else '' }}>{{ doctor.doctor_label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="full">
      <label class="form-label">{{ t('treatment_name') }}</label>
      <input class="form-control" type="text" name="treatment_text" value="{{ reception_form.treatment_text }}">
    </div>
    <div class="reception-checkbox">
      <input id="money_received_today" type="checkbox" name="money_received_today" value="1" {{ 'checked' if reception_form.money_received_today else '' }}>
      <label for="money_received_today">{{ t('reception_money_received_today') }}</label>
    </div>
    <div></div>
    <div>
      <label class="form-label">{{ t('amount') }}</label>
      <input class="form-control" type="text" name="paid_today" value="{{ reception_form.paid_today }}">
    </div>
    <div>
      <label class="form-label">{{ t('total_amount') }}</label>
      <input class="form-control" type="text" name="total_amount" value="{{ reception_form.total_amount }}">
    </div>
    <div>
      <label class="form-label">{{ t('discount') }}</label>
      <input class="form-control" type="text" name="discount_amount" value="{{ reception_form.discount_amount }}">
    </div>
    <div class="full">
      <label class="form-label">{{ t('notes') }}</label>
      <textarea class="form-control" name="note" rows="3">{{ reception_form.note }}</textarea>
    </div>
    <div class="full">
      <button class="btn primary" type="submit">{{ submit_label }}</button>
    </div>
  </div>
</form>
