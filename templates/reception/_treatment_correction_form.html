{% if treatment_correction_errors %}
<div class="reception-errors">
  <ul>
    {% for error in treatment_correction_errors %}
    <li>{{ error }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}
<form method="post" action="{{ form_action }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="patient_id" value="{{ locked_treatment.patient_id }}">
  <input type="hidden" name="treatment_id" value="{{ locked_treatment.treatment_id }}">
  <div class="reception-form-grid">
    <div class="full">
      <label class="form-label">{{ t('treatment_name') }}</label>
      <input class="form-control" type="text" name="treatment_text" value="{{ treatment_correction_form.treatment_text }}">
    </div>
    <div>
      <label class="form-label">{{ t('date') }}</label>
      <input class="form-control" type="date" name="visit_date" value="{{ treatment_correction_form.visit_date }}">
    </div>
    <div>
      <label class="form-label">{{ t('visit_type') }}</label>
      <select class="form-control" name="visit_type">
        <option value="exam" {{ 'selected' if treatment_correction_form.visit_type == 'exam' else '' }}>{{ t('vt_exam') }}</option>
        <option value="followup" {{ 'selected' if treatment_correction_form.visit_type == 'followup' else '' }}>{{ t('vt_follow') }}</option>
        <option value="none" {{ 'selected' if treatment_correction_form.visit_type == 'none' else '' }}>{{ t('vt_none') }}</option>
      </select>
    </div>
    <div>
      <label class="form-label">{{ t('doctor') }}</label>
      <select class="form-control" name="doctor_id">
        {% for doctor in doctor_options %}
        <option value="{{ doctor.doctor_id }}" {{ 'selected' if treatment_correction_form.doctor_id == doctor.doctor_id else '' }}>{{ doctor.doctor_label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="form-label">{{ t('total_amount') }}</label>
      <input class="form-control" type="text" name="total_amount" value="{{ treatment_correction_form.total_amount }}">
    </div>
    <div>
      <label class="form-label">{{ t('discount') }}</label>
      <input class="form-control" type="text" name="discount_amount" value="{{ treatment_correction_form.discount_amount }}">
    </div>
    <div class="full">
      <label class="form-label">{{ t('notes') }}</label>
      <textarea class="form-control" name="note" rows="3">{{ treatment_correction_form.note }}</textarea>
    </div>
    <div class="full">
      <button class="btn primary" type="submit">{{ submit_label }}</button>
    </div>
  </div>
</form>
